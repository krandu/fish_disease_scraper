name: 🐟 Fish Disease Dataset Collector

on:
  workflow_dispatch:
    inputs:
      max_per_class:
        description: '每类最多图片数'
        required: false
        default: '50'
      diseases:
        description: '指定疾病 (中文名, 逗号分隔; 留空=全部)'
        required: false
        default: ''
      sources:
        description: '图片来源 (inat,gbif,flickr,wikimedia)'
        required: false
        default: 'inat,gbif,wikimedia'

  schedule:
    - cron: '0 2 * * 0'

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run collector
        env:
          FLICKR_API_KEY: ${{ secrets.FLICKR_API_KEY }}
        run: |
          python fish_disease_scraper.py \
            --max-per-class ${{ github.event.inputs.max_per_class || '50' }} \
            --sources "${{ github.event.inputs.sources || 'inat,gbif,wikimedia' }}" \
            --no-zip \
            ${{ github.event.inputs.diseases != '' && format('--diseases "{0}"', github.event.inputs.diseases) || '' }}

      - name: List dataset summary
        run: |
          echo "=== Dataset Summary ==="
          cat fish_disease_dataset/dataset_index.json || true
          echo ""
          echo "=== File counts per class ==="
          find fish_disease_dataset -name "*.jpg" -o -name "*.png" -o -name "*.jpeg" \
            | awk -F/ '{print $2}' | sort | uniq -c | sort -rn || true

      # 由 Actions 统一打包，不让脚本再生成一份，避免 1.18GB x2
      - name: Package dataset into ZIP
        run: |
          ZIP_NAME="fish_disease_dataset_$(date +%Y%m%d_%H%M).zip"
          zip -r "$ZIP_NAME" fish_disease_dataset/
          echo "ZIP_FILE=$ZIP_NAME" >> $GITHUB_ENV
          echo "ZIP size: $(du -sh $ZIP_NAME | cut -f1)"

      # 只上传一个 artifact
      - name: Upload dataset ZIP
        uses: actions/upload-artifact@v4
        with:
          name: fish-disease-dataset-${{ github.run_number }}
          path: ${{ env.ZIP_FILE }}
          retention-days: 30
